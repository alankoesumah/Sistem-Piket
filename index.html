<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Piket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #4c1d95; color: white; padding: 20px 40px;
            border-radius: 16px; display: none; z-index: 2000;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            font-weight: 600; text-align: center;
        }
        .loading-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
        /* =========================================================
           URL Web App Apps Script kamu.
        ========================================================= */
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwEhfXXDQKHjGOpyvhDi9eRofcokzHZbLmh7DUak8WQAWh4dSudFVyciSSubysJehht/exec";

        /* =========================================================
           PENTING: Ini harus link ke SPREADSHEET-nya, bukan ke
           editor Apps Script. Bentuknya seperti:
           https://docs.google.com/spreadsheets/d/XXXXXXXXXXXX/edit
           Cara dapatnya: buka Google Sheet kamu (bukan Apps Script),
           lalu copy URL dari address bar browser.
        ========================================================= */
        const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/1GTCroUjjgeykR-w8CS-l6_7kNnzqvikh-k9Fj1T3XEc/edit?gid=0#gid=0";

        const AUTO_REFRESH_INTERVAL = 30000; // 30 detik

        let dataPergantian = [];
        let dataKejadian = [];

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        function setAutoDate() {
            const now = new Date();
            const dateStr = now.toISOString().split('T')[0];
            document.getElementById('tanggal').value = dateStr;
            document.getElementById('tanggal_pergantian').value = dateStr;
        }

        function showMenu(menuId) {
            if (menuId === 'rekap_laporan_link') {
                document.getElementById('password_modal').classList.remove('hidden');
                return;
            }
            document.querySelectorAll('.menu-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.menu-btn').forEach(b => {
                b.classList.remove('bg-purple-900', 'text-white');
                b.classList.add('bg-white', 'text-slate-800');
            });

            document.getElementById(menuId).classList.remove('hidden');
            event.currentTarget.classList.remove('bg-white', 'text-slate-800');
            event.currentTarget.classList.add('bg-purple-900', 'text-white');
        }

        function verifyPassword() {
            const pass = document.getElementById('pass_input').value;
            if (pass === 'tuglo') {
                window.open(GOOGLE_SHEET_URL, '_blank');
                closeModal();
            } else {
                document.getElementById('error_msg').classList.remove('hidden');
            }
        }

        function closeModal() {
            document.getElementById('password_modal').classList.add('hidden');
            document.getElementById('pass_input').value = '';
            document.getElementById('error_msg').classList.add('hidden');
        }

        function formatTanggalIndo(dateInputValue) {
            return new Intl.DateTimeFormat('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })
                .format(new Date(dateInputValue));
        }

        // Kirim data ke Google Sheet lewat Apps Script.
        // Pakai text/plain supaya browser tidak melakukan CORS preflight (lebih stabil untuk Apps Script).
        async function kirimKeSheet(payload) {
            return fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });
        }

        async function submitLaporan() {
            const nama = document.getElementById('nama_petugas').value;
            if (!nama) return alert('Nama petugas wajib diisi!');

            const waktuPiket = Array.from(document.querySelectorAll('.waktu-piket:checked'))
                .map(el => el.value).join(', ');
            const lokasiEl = document.querySelector('input[name="lokasi"]:checked');
            const lokasi = lokasiEl ? lokasiEl.value : '';
            const statusKejadian = document.getElementById('kejadian_ada').checked ? 'Ada' : 'Aman';
            const tanggalFormatted = formatTanggalIndo(document.getElementById('tanggal').value);

            const payload = {
                type: 'laporan',
                tanggal: tanggalFormatted,
                nama: nama,
                waktu: waktuPiket,
                lokasi: lokasi,
                statusKejadian: statusKejadian,
                kronologis: document.getElementById('kronologis').value,
                tindakan: document.getElementById('tindakan').value
            };

            const btn = event.currentTarget;
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = 'Menyimpan...';

            try {
                await kirimKeSheet(payload);

                if (statusKejadian === 'Ada') {
                    dataKejadian.push({
                        nama: nama,
                        tanggal: tanggalFormatted,
                        kronologis: payload.kronologis,
                        tindakan: payload.tindakan
                    });
                    renderKejadian();
                }

                showToast("Terima kasih sudah piket 😊");
                document.getElementById('nama_petugas').value = '';
                document.getElementById('kronologis').value = '';
                document.getElementById('tindakan').value = '';
                document.querySelectorAll('.waktu-piket').forEach(el => el.checked = false);
                document.querySelectorAll('input[name="lokasi"]').forEach(el => el.checked = false);
                document.querySelector('input[name="kejadian"][value="Aman"]').checked = true;
            } catch (err) {
                alert('Gagal menyimpan ke Google Sheet. Cek koneksi internet atau SCRIPT_URL. Detail: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        }

        async function submitPergantian() {
            const petugas = document.getElementById('petugas_asli').value;
            if (!petugas) return alert('Nama petugas wajib diisi!');

            const tanggalFormatted = formatTanggalIndo(document.getElementById('tanggal_pergantian').value);
            const payload = {
                type: 'pergantian',
                tanggal: tanggalFormatted,
                petugas: petugas,
                pengganti: document.getElementById('guru_pengganti').value,
                alasan: document.getElementById('alasan').value
            };

            const btn = event.currentTarget;
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = 'Menyimpan...';

            try {
                await kirimKeSheet(payload);

                dataPergantian.push(payload);
                renderPergantian();

                showToast("Terima kasih");
                document.getElementById('petugas_asli').value = '';
                document.getElementById('guru_pengganti').value = '';
                document.getElementById('alasan').value = '';
            } catch (err) {
                alert('Gagal menyimpan ke Google Sheet. Cek koneksi internet atau SCRIPT_URL. Detail: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        }

        // Cek apakah user sedang aktif mengetik di salah satu form,
        // supaya auto-refresh tidak mengganggu isian yang belum disubmit.
        function sedangMengetik() {
            const activeTag = document.activeElement.tagName;
            return activeTag === 'INPUT' || activeTag === 'TEXTAREA';
        }

        // Ambil semua data yang sudah pernah tersimpan di Sheet.
        async function loadDataFromSheet() {
            if (!SCRIPT_URL || SCRIPT_URL.includes('PASTE_URL')) {
                console.warn('SCRIPT_URL belum diisi, data lama tidak akan dimuat.');
                return;
            }
            try {
                const res = await fetch(SCRIPT_URL, { method: 'GET' });
                const data = await res.json();

                dataKejadian = (data.laporan || [])
                    .filter(item => item.statusKejadian === 'Ada')
                    .map(item => ({
                        nama: item.nama,
                        tanggal: item.tanggal,
                        kronologis: item.kronologis,
                        tindakan: item.tindakan
                    }));

                dataPergantian = (data.pergantian || []).map(item => ({
                    tanggal: item.tanggal,
                    petugas: item.petugas,
                    pengganti: item.pengganti,
                    alasan: item.alasan
                }));

                renderKejadian();
                renderPergantian();
            } catch (err) {
                console.error('Gagal memuat data dari Sheet:', err);
            }
        }

        // Auto-refresh berkala, dilewati kalau user sedang mengetik di form.
        async function autoRefreshLoop() {
            if (!sedangMengetik()) {
                await loadDataFromSheet();
            }
        }

        function renderKejadian() {
            document.getElementById('kejadian_body').innerHTML = dataKejadian.map(item => `
                <tr class="border-b"><td class="p-3">${item.tanggal}</td><td class="p-3">${item.nama}</td><td class="p-3">${item.kronologis}</td><td class="p-3">${item.tindakan}</td></tr>
            `).join('') || `<tr><td class="p-3 text-slate-400" colspan="4">Belum ada data kejadian.</td></tr>`;
        }

        function renderPergantian() {
            document.getElementById('rekap_body').innerHTML = dataPergantian.map(item => `
                <tr class="border-b"><td class="p-3">${item.tanggal}</td><td class="p-3">${item.petugas}</td><td class="p-3">${item.pengganti}</td><td class="p-3">${item.alasan}</td></tr>
            `).join('') || `<tr><td class="p-3 text-slate-400" colspan="4">Belum ada data pergantian.</td></tr>`;
        }

        window.onload = () => {
            setAutoDate();
            lucide.createIcons();
            loadDataFromSheet();
            setInterval(autoRefreshLoop, AUTO_REFRESH_INTERVAL);
        };
    </script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
    <div id="toast" class="toast"></div>

    <div id="password_modal" class="hidden fixed inset-0 bg-black/50 z-[2000] flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-xl">
            <h3 class="font-bold text-lg mb-4 text-purple-900">Password Diperlukan</h3>
            <input type="password" id="pass_input" placeholder="Masukkan password" class="w-full p-3 border border-slate-200 rounded-xl mb-2">
            <p id="error_msg" class="text-red-500 text-sm mb-4 hidden">Password salah!</p>
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 bg-slate-200 p-3 rounded-xl font-bold">Tutup</button>
                <button onclick="verifyPassword()" class="flex-1 bg-purple-900 text-white p-3 rounded-xl font-bold">Buka</button>
            </div>
        </div>
    </div>

    <header class="bg-purple-900 p-6 shadow-md text-white">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://i.imgur.com/owOtwJ8.png" alt="Logo" class="h-10 w-auto filter brightness-0 invert">
                <span class="font-bold text-lg">SDNP Tunas Global</span>
            </div>
            <h1 class="font-bold text-xl uppercase tracking-wider flex items-center gap-2">
                <div class="p-1 rounded-full border border-white"><i data-lucide="person-standing" class="w-4 h-4"></i></div> Sistem Piket
            </h1>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <div class="flex flex-wrap gap-2 mb-6 bg-white p-2 rounded-xl shadow-sm border border-slate-200">
            <button onclick="showMenu('laporan')" class="menu-btn bg-purple-900 text-white px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2"><i data-lucide="file-text" class="w-4 h-4"></i> Laporan</button>
            <button onclick="showMenu('pergantian')" class="menu-btn bg-white text-slate-800 px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2"><i data-lucide="refresh-cw" class="w-4 h-4"></i> Pergantian</button>
            <button onclick="showMenu('data_kejadian')" class="menu-btn bg-white text-slate-800 px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2"><i data-lucide="alert-triangle" class="w-4 h-4"></i> Data Kejadian</button>
            <button onclick="showMenu('rekap')" class="menu-btn bg-white text-slate-800 px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2"><i data-lucide="clipboard-list" class="w-4 h-4"></i> Rekap Pergantian</button>
            <button onclick="showMenu('rekap_laporan_link')" class="menu-btn bg-white text-slate-800 px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2"><i data-lucide="database" class="w-4 h-4"></i> Rekap Laporan</button>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
            <section id="laporan" class="menu-content space-y-3">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-3">
                    <div class="p-2 rounded-full border border-purple-200 bg-gradient-to-br from-purple-100 to-white"><i data-lucide="person-standing" class="w-5 h-5 text-purple-900"></i></div>
                    Laporan Piket
                </h2>

                <input type="date" id="tanggal" class="w-full p-3 rounded-xl border border-slate-200">
                <input type="text" id="nama_petugas" placeholder="Nama Petugas" class="w-full p-3 rounded-xl border border-slate-200">

                <div class="mt-12">
                    <label class="block text-sm font-bold text-purple-900 mb-2 flex items-center gap-2"><i data-lucide="clock" class="w-4 h-4"></i> Waktu Piket:</label>
                    <div class="flex flex-wrap gap-4 text-sm mb-6">
                        <label><input type="checkbox" class="waktu-piket" value="Pagi"> Pagi</label>
                        <label><input type="checkbox" class="waktu-piket" value="Break 1"> Break 1</label>
                        <label><input type="checkbox" class="waktu-piket" value="Break 2"> Break 2</label>
                    </div>
                </div>

                <div class="mt-12">
                    <label class="block text-sm font-bold text-purple-900 mb-2 flex items-center gap-2"><i data-lucide="map-pin" class="w-4 h-4"></i> Lokasi:</label>
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-2 text-sm mb-6">
                        <label><input type="radio" name="lokasi" value="Loby"> Loby</label>
                        <label><input type="radio" name="lokasi" value="Lapangan"> Lapangan</label>
                        <label><input type="radio" name="lokasi" value="Lt 2"> Lt 2</label>
                        <label><input type="radio" name="lokasi" value="Lt 3"> Lt 3</label>
                        <label><input type="radio" name="lokasi" value="Lt 4"> Lt 4</label>
                    </div>
                </div>

                <div class="mt-12">
                    <label class="block text-sm font-bold text-purple-900 mb-2 flex items-center gap-2"><i data-lucide="shield" class="w-4 h-4"></i> Kejadian:</label>
                    <div class="flex gap-4">
                        <label><input type="radio" name="kejadian" value="Aman" checked> Aman</label>
                        <label><input type="radio" name="kejadian" id="kejadian_ada" value="Ada"> Ada</label>
                    </div>
                </div>

                <div class="pt-2 space-y-3">
                    <textarea id="kronologis" placeholder="Kronologis Kejadian" class="w-full p-3 rounded-xl border border-slate-200"></textarea>
                    <input type="text" id="tindakan" placeholder="Tindakan Petugas Piket" class="w-full p-3 rounded-xl border border-slate-200">
                    <button type="button" onclick="submitLaporan()" class="w-full bg-purple-900 text-white p-4 rounded-xl font-bold hover:bg-purple-800 transition flex items-center justify-center gap-2"><i data-lucide="save" class="w-5 h-5"></i> Simpan Laporan</button>
                </div>
            </section>

            <section id="pergantian" class="menu-content hidden space-y-3">
                <h2 class="text-xl font-bold mb-4">Pergantian Jadwal</h2>
                <input type="date" id="tanggal_pergantian" class="w-full p-3 rounded-xl border border-slate-200">
                <input type="text" id="petugas_asli" placeholder="Nama Petugas Asli" class="w-full p-3 rounded-xl border border-slate-200">
                <input type="text" id="guru_pengganti" placeholder="Nama Guru Pengganti" class="w-full p-3 rounded-xl border border-slate-200">
                <textarea id="alasan" placeholder="Alasan" class="w-full p-3 rounded-xl border border-slate-200"></textarea>
                <button type="button" onclick="submitPergantian()" class="w-full bg-purple-900 text-white p-4 rounded-xl font-bold hover:bg-purple-800 transition flex items-center justify-center gap-2"><i data-lucide="send" class="w-5 h-5"></i> Submit</button>
            </section>

            <section id="data_kejadian" class="menu-content hidden overflow-x-auto">
                <h2 class="text-xl font-bold mb-2">Data Kejadian</h2>
                <table class="w-full text-left text-sm border-collapse">
                    <thead class="bg-slate-50 border-b"><tr><th class="p-3">Tgl</th><th class="p-3">Petugas</th><th class="p-3">Kronologi</th><th class="p-3">Tindakan</th></tr></thead>
                    <tbody id="kejadian_body"></tbody>
                </table>
            </section>

            <section id="rekap" class="menu-content hidden overflow-x-auto">
                <h2 class="text-xl font-bold mb-2">Data Pergantian Jadwal</h2>
                <table class="w-full text-left text-sm border-collapse">
                    <thead class="bg-slate-50 border-b"><tr><th class="p-3">Tgl</th><th class="p-3">Petugas</th><th class="p-3">Pengganti</th><th class="p-3">Alasan</th></tr></thead>
                    <tbody id="rekap_body"></tbody>
                </table>
            </section>
        </div>
    </main>
</body>
</html>
